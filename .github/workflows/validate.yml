name: Validate

on:
  push:
    branches:
      - master
    paths:
      - 'xmcl-runtime/**'
      - 'xmcl-runtime-api/**'
      - 'xmcl-keystone-ui/**'
      - 'xmcl-electron-app/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: bun install
      - name: Lint
        run: bun run lint
      - name: Check
        run: bun run check
      - name: Test
        run: bunx vitest run --exclude 'xmcl/**'
      - name: Build
        run: |
          bun run --cwd xmcl-keystone-ui build
          bun run --cwd xmcl-electron-app build
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          NODE_ENV: production
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.CODE_SIGN_BASE64 }}
          APPX_PUBLISHER: ${{ secrets.APPX_PUBLISHER }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.CODE_SIGN_PWD }}
