name: Validate

on:
  push:
    branches:
      - master
    paths:
      - 'xmcl-runtime/**'
      - 'xmcl-runtime-api/**'
      - 'xmcl-keystone-ui/**'
      - 'xmcl-electron-app/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'pnpm'
    - name: Cache Electron binaries
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/.cache/electron
          ${{ github.workspace }}/.cache/electron-builder
        key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
    - name: Cache Vite deps
      uses: actions/cache@v4
      with:
        path: xmcl-keystone-ui/node_modules/.vite
        key: ${{ runner.os }}-vite-${{ hashFiles('pnpm-lock.yaml', 'xmcl-keystone-ui/vite.config.ts') }}
    - name: Install
      run: |
        pnpm install --frozen-lockfile
    - name: Lint
      run: |
        pnpm lint
    - name: Check
      run: |
        pnpm check
    - name: Test
      run: |
        pnpm vitest run --exclude 'packages/**'
    - name: Build
      run: |
        pnpm run --prefix xmcl-keystone-ui build
        pnpm run --prefix xmcl-electron-app build
      env:
        BUILD_NUMBER: ${{ github.run_number }}
        NODE_ENV: production
        CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_TOKEN }}
        WIN_CSC_LINK: ${{ secrets.CODE_SIGN_BASE64 }}
        APPX_PUBLISHER: ${{ secrets.APPX_PUBLISHER }}
        WIN_CSC_KEY_PASSWORD: ${{ secrets.CODE_SIGN_PWD }}

  e2e-smoke:
    name: E2E Smoke (boot)
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15
    env:
      # Electron tests use _electron.launch() and don't need a Playwright-
      # managed Chromium download (~660 MB).
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install (root)
        run: pnpm install --frozen-lockfile

      - name: Install (e2e)
        # e2e/ is intentionally outside the workspace; install separately.
        run: pnpm e2e:install --frozen-lockfile

      - name: Build renderer
        run: pnpm build:renderer
        env:
          NODE_ENV: production

      - name: Compile electron main
        run: pnpm --prefix=xmcl-electron-app compile

      - name: Run smoke specs
        # Only the 00-smoke-boot.spec.ts pair (new user + existing user).
        # The full e2e suite hits live network and is reserved for the
        # manual `e2e` workflow.
        run: xvfb-run --auto-servernum pnpm test:e2e:smoke

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts
          path: e2e/artifacts/**
          retention-days: 7
