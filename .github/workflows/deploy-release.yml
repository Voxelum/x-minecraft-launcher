name: Deploy Release
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - name: Download Releases
      uses: robinraju/release-downloader@v1.7
      with:
        repository: "voxelum/x-minecraft-launcher"
        tag: ${{ github.event.release.tag_name }}
        fileName: "*"
        out-file-path: build
    - name: Upload to Azure
      uses: ci010/upload-blob-to-azure@master
      env:
        AZURE_ACCOUNT_KEY: ${{ secrets.AZURE_ACCOUNT_KEY }}
      with:
        account: xmcl
        container: releases
        directory: ./build
    - name: Update Web Page
      uses: benc-uk/workflow-dispatch@v1
      with:
        workflow: Deploy
        token: ${{ secrets.PAT_GITHUB_TOKEN }}
        ref: 'master'
        repo: 'voxelum/xmcl-page'
    - name: Create release version file
      run: |
        mkdir releases
        echo ${{ github.event.release.tag_name }} > ./releases/VERSION
        cat << EOF > ./releases/latest_version.json
        ${{ toJSON(github.event.release) }}
        EOF
    - name: Upload release version file to Azure
      uses: ci010/upload-blob-to-azure@master
      env:
        AZURE_ACCOUNT_KEY: ${{ secrets.AZURE_ACCOUNT_KEY }}
      with:
        account: xmcl
        container: releases
        directory: ./releases

  notify:
    needs:
      - publish
    name: Notify Kook and discord
    runs-on: ubuntu-latest
    steps:
    - name: Publish Release Notification
      uses: voxelum/discord-kook-notify-action@main
      with:
        version: ${{ github.event.release.tag_name }}
        token: ${{ secrets.KOOK_BOT_TOKEN }}
        discord: ${{ secrets.DISCORD_WEBHOOK }}

  update-brew:
    needs: 
      - publish
    name: Update Brew
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v5
      with:
        repository: Voxelum/homebrew-xmcl
        path: homebrew-xmcl
        token: ${{ secrets.PAT_GITHUB_TOKEN }}
    - uses: actions/github-script@v8
      name: Update Brew Formula
      with: 
        result-encoding: string
        script: |
          const version = '${{ github.event.release.tag_name }}'.substring(1);
          const fs = require('fs');
          const text = `cask "xmcl" do
            version "${version}"
            sha256 :no_check
            arch arm: "arm64", intel: "x86_64"

            on_arm do 
              url "https://github.com/Voxelum/x-minecraft-launcher/releases/download/v${version}/xmcl-${version}-arm64.dmg"
            end

            on_intel do
              url "https://github.com/Voxelum/x-minecraft-launcher/releases/download/v${version}/xmcl-${version}-x64.dmg"
            end

            name "X Minecraft Launcher"
            desc "An Open Source Minecraft Launcher with Modern UX. Provides a Disk Efficient way to manage all your Mods!"
            homepage "https://xmcl.app"

            livecheck do
              url :url
              strategy :header_match
            end
            
            app "X Minecraft Launcher.app"

            zap trash: [
              "~/Applications/X Minecraft Launcher.app",
              "~/Library/Application Support/xmcl",
              "~/Library/Preferences/xmcl.plist",
              "~/Library/Saved Application State/xmcl.savedState"
            ]
          end
          `
          fs.writeFileSync('./homebrew-xmcl/Casks/xmcl.rb', text);
    - name: Push to homebrew-xmcl
      working-directory: homebrew-xmcl
      run: |
        if [ -z "$(git status --porcelain)" ]; then
          echo "Formula already up to date."
          exit 0
        fi
        git config user.name ci010
        git config user.email cijhn@hotmail.com
        git add Casks/xmcl.rb
        git commit -m "Bump xmcl to ${{ github.event.release.tag_name }}"
        git push origin HEAD:master

  update-winget:
    needs: 
      - publish
    name: Upload To winget
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: powershell
    steps:
      - name: Download Releases
        uses: robinraju/release-downloader@v1.8
        with:
          repository: "voxelum/x-minecraft-launcher"
          tag: ${{ github.event.release.tag_name }}
          fileName: "version"
      - uses: actions/github-script@v8
        name: Get Release Version
        id: version
        with: 
          result-encoding: string
          script: |
            return '${{ github.event.release.tag_name }}'.substring(1);
      - name: Update version env
        run: |
          echo "VERSION=$(cat ./version)" >> $env:GITHUB_ENV
      - name: Create winget PR
        run: |
          iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update CI010.XMinecraftLauncher -u $Env:URL -v $Env:VERSION -t $Env:TOKEN --submit
        env:
          TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
          URL: ${{ format('https://xmcl-core-api.azurewebsites.net/api/appx?version={0}', steps.version.outputs.result) }}

  update-flatpak:
    needs:
      - publish
    name: Update Flatpak metadata
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
    steps:
      - name: Checkout flatpak-metadata
        uses: actions/checkout@v5
        with:
          repository: Voxelum/flatpak-metadata
          path: flatpak-metadata
          token: ${{ secrets.PAT_GITHUB_TOKEN }}
      - name: Update version and metainfo
        working-directory: flatpak-metadata
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          # `version` file: bare tag, e.g. v0.55.0
          echo "$TAG" > version

          # Prepend a new <release> entry inside the <releases> block of
          # the AppStream metainfo. Date format is ISO yyyy-MM-dd, taken
          # from the GitHub release publish timestamp.
          export DATE=$(date -u -d "${{ github.event.release.published_at }}" +%Y-%m-%d)
          node -e '
            const fs = require("fs");
            const file = "app.xmcl.voxelum.metainfo.xml";
            const tag = process.env.TAG;
            const date = process.env.DATE;
            const entry =
              `    <release version="${tag}" date="${date}">\n` +
              `      <url>https://github.com/Voxelum/x-minecraft-launcher/releases/tag/${tag}</url>\n` +
              `    </release>`;
            let xml = fs.readFileSync(file, "utf8");
            if (xml.includes(`version="${tag}"`)) {
              console.log("Release entry for " + tag + " already present.");
              process.exit(0);
            }
            // Insert immediately after the opening <releases> tag so the
            // newest release stays at the top.
            xml = xml.replace(/(<releases>\s*\n)/, `$1${entry}\n`);
            fs.writeFileSync(file, xml);
          '
      - name: Commit and push
        working-directory: flatpak-metadata
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Metadata already up to date."
            exit 0
          fi
          git config user.name ci010
          git config user.email cijhn@hotmail.com
          git add version app.xmcl.voxelum.metainfo.xml
          git commit -m "Update metadata for ${{ github.event.release.tag_name }}"
          git push origin HEAD:main
      - name: Mirror GitHub release
        # The flatpak-metadata repo mirrors a release per launcher version,
        # which is what Flathub watches via the AppStream <releases> feed.
        working-directory: flatpak-metadata
        run: |
          if gh release view "${{ github.event.release.tag_name }}" >/dev/null 2>&1; then
            echo "Release ${{ github.event.release.tag_name }} already exists."
            exit 0
          fi
          gh release create "${{ github.event.release.tag_name }}" \
            --title "Release for XMCL - ${{ github.event.release.tag_name }}" \
            --notes "Update metadata for ${{ github.event.release.tag_name }}"

