  launchDescription: اضغط على الزرار ده لتثبيت أو تشغيل اللعبة.
  mod:
    defaultSourceDescription: تقدر تختار مصدر معلومات وتفاصيل المودات من هنا. المودات دي منشورة على Modrinth و Curseforge. لو عاوز تبدل بين المنصتين دول، تقدر تغير الخيار من هنا.
    defaultSourceTitle: اختر مصدر محتوى المودات
    detailDescription: لما تختار عنصر على الشمال، هتشوف تفاصيل المود ده. المحتوى ممكن ييجي من Modrinth أو Curseforge أو معلومات المود المحلية بعد تحليلها.
    detailTitle: تفاصيل المود
    listDescription: هنعرض المودات المتثبتة لما متكتبش حاجة في البحث. أول ما تكتب كلمة بحث أو تختار فئة معينة، هتشوف المودات اللي لقيناها.
    listTitle: المودات المثبتة أو نتائج البحث
    searchDescription: تقدر تبحث عن المودات من Modrinth، أو Curseforge، أو من الكاش المحلي بتاعك باستخدام صندوق البحث ده.
    searchTitle: البحث في المودات
  multiplayer:
    contentDescription: الاتصالات بينك وبين اللاعبين التانيين هتظهر هنا في القائمة.
    contentTitle: '@:multiplayer.connections'
    groupDescription: تقدر تنشئ أو تنضم لمجموعة مع لاعبين تانيين. اللانشر هيحاول يعمل اتصال P2P بينك وبين أصحابك بناءً على المجموعة دي. تقدر تكتب اسم المجموعة اللي أصحابك عملوها، أو تعمل اسم فريد خاص بيك.
    groupTitle: الانضمام لمجموعة
    joinDescription: أول ما تكتب اسم المجموعة، تقدر تضغط على الزرار ده للانضمام أو لإنشائها. لو اسم المجموعة فاضي، اللانشر هيولد لك اسم عشوائي تلقائياً.
    manualDescription: لو أنت أو صديقك مش عارفين تتصلوا بالمجموعة، تقدروا تجربوا تبادل الرموز (Tokens) يدوياً بالضغط على اتصال يدوياً. لو ده برضه فشل، فالمشكلة غالباً من مزود الإنترنت عندك أو عنده.
  recentPlayDescription: الألعاب والنسخ اللي عملتها هتظهر هنا في القائمة. تقدر تبدل طريقة العرض عشان تشوف برضه الإصدارات المثبتة وحزم المودات المتنزلة.
  storePoupularModpackDescription: هتشوف حزم المودات الأكثر شعبية ورواجاً على Curseforge و Modrinth في القسم ده.
  storeSearchCategoryDescription: تقدر برضه تبدل الفئات والتصنيفات أو الفلاتر من هنا.
