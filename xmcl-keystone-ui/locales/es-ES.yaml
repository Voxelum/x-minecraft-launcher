      Una vez que introduzcas un nombre de grupo, puedes hacer clic en este
      botón para unirte o crear el grupo. Si el nombre del grupo está vacío, el
      lanzador generará un nombre para ti.
    manualDescription: >-
      Si tú o tu amigo no podéis conectaros al grupo, podéis intentar
      intercambiar el token manualmente haciendo clic en conectar manualmente.
      Si eso también falla, puede ser un problema de Internet.
