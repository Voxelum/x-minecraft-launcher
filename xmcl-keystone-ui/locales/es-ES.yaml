      Puedes crear o unirte a un grupo con otros jugadores. El lanzador
      intentará crear conexiones P2P entre tú y tus amigos según el grupo.
      Puedes introducir el nombre del grupo dado por tus amigos. O puedes crear
      un nombre único.
