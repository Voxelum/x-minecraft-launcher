    detailDescription: >-
      Lorsque vous sélectionnez un élément sur la gauche.

      Vous verrez le détail du mod.

      Le contenu peut provenir de Modrinth, Curseforge ou du contenu analysé du mod.
    detailTitle: Détails du module
    listDescription: >-
      Nous afficherons les mods installés lorsque vous n’avez aucune entrée.

      Vous verrez les mods recherchés une fois que vous aurez saisi le mot-clé ou la catégorie sélectionné.
