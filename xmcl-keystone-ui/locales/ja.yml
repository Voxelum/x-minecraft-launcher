tutorial:
  instanceSelectDescription: このボタンをクリックすると、試合を選択したりニュースを読んだりするページに移動します。
  launchDescription: ゲームをインストールまたは起動するには、このボタンをクリックします。
  mod:
    defaultSourceDescription: >-
      ここでは、MODの詳細なソースを選択することができます。ModrinthとCurseforgeの両方に公開されているMODがあります。この2つのコンテンツプロバイダを切り替えたい場合。ここで値を変更できます。
    defaultSourceTitle: MODコンテンツソースの選択
    detailDescription: >-
      左の項目を選択すると
      MODの詳細が表示されます。コンテンツはModrinth、Curseforge、または解析されたMODのコンテンツから来ることができます。
    detailTitle: MOD詳細
    listDescription: 何も入力されていない場合は、インストールされているMODが表示されます。キーワードやカテゴリを入力すると、検索されたMODが表示されます。
    listTitle: インストールまたは検索されたMOD
    searchDescription: Modrinth、Curseforge、またはローカルキャッシュからMODを検索できます。
    searchTitle: 検索モッズ
  multiplayer:
    contentDescription: あなたと仲間のつながりは、ここにリストアップされる。
    contentTitle: '@:multiplayer.connections'
    groupDescription: >-
      他のプレイヤーとグループを作ったり、参加したりすることができます。ランチャーはグループに従って、あなたとフレンドの間にP2P接続を作成しようとします。フレンドがつけたグループ名を入力することができます。または、自分でユニークな名前を作ることもできます。
    groupTitle: グループに参加する
    joinDescription: グループ名を入力します。このボタンをクリックすると、グループに参加または作成することができます。グループ名が空の場合、ランチャーが名前を生成します。
    manualDescription: >-
      あなたやあなたの友人がグループに接続できない場合。手動接続をクリックして、手動でトークンを交換してみてください。それも失敗した場合は、インターネットの問題かもしれません。
  recentPlayDescription: 作成されたゲームはここにリストアップされます。インストールされたバージョンやダウンロードされたMODパックもここで表示を切り替えることができます。
  storePoupularModpackDescription: >-
    カテゴリーやフィルタを切り替えることもできます。aこのセクションでは、CurseforgeとModrinthで最も人気のあるModpackを見ることができます。
  storeSearchCategoryDescription: ここでカテゴリーやフィルターを切り替えることもできる。
  storeSearchDescription: このテキストボックスに入力すると、Modpackを検索できます。検索するにはEnterキーを押してください。
  storeSearchResultDescription: すべての検索結果がここにリストされます。
