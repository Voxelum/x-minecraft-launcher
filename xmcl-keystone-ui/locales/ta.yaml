  exposedPorts: முன்னனுப்பப்பட்ட போர்ட்கள்
  gatheringIce: |
    "உங்கள் நெட்வொர்க்கைப் பற்றிய போதுமான தகவலைச் சேகரிக்க ICE சேவையகத்திற்காக காத்திருக்கவும். உங்களுக்கு அவசரமாக இருந்து, போதுமான தகவல் இருந்தால், தற்போதைய SDP-ஐ முன்கூட்டியே மற்ற தரப்பினருக்கு வழங்கி, அடுத்து என்பதைத் கிளிக் செய்யலாம். <span class=\"v-chip v-chip--label v-size--small\" style=\"text-font: bold\" >உள்ளூர் டோக்கனை</span> உங்கள் இணைப்பாளருக்கு அனுப்பவும், அவர்கள் உங்கள் டோக்கனை <span class=\"v-chip v-chip--label v-size--small\" style=\"text-font: bold\"> இணைப்பில் சேர் </span> பிரிவில் உள்ளிட வேண்டும். <br> <span class=\"v-chip v-chip--label v-size--small\" style=\"text-font: bold\">உள்ளூர் டோக்கனை</span> உருவாக்க உங்கள் தகவல்களைச் சேகரிக்க ICE சேவையகத்திற்கு சிறிது நேரம் தேவைப்படலாம்.<br> ICE நிலை முடியும் வரை நீங்கள் காத்திருக்க வேண்டியதில்லை. கீழே உள்ள டோக்கன் மாறாமல் இருந்தால், அதை நகலெடுத்து உங்கள் இணைப்பாளருக்கு அனுப்பலாம்."
