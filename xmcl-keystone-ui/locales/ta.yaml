    invalidChar: பாதையில் செல்லாத எழுத்துக்கள் உள்ளன! இது மைன்கிராஃப்ட் தொடங்குவதில் தோல்வியை ஏற்படலாம்! தயவுசெய்து ஆங்கில எழுத்துக்கள் மற்றும் குறியீடுகளை மட்டுமே பயன்படுத்தவும்!
    noPermission: தேர்ந்தெடுக்கப்பட்ட கோப்பகத்தை அணுக துவக்கிக்கு அனுமதி இல்லை! தயவுசெய்து இன்னொன்றை முயற்சிக்கவும்.
    nonDictionary: தேர்ந்தெடுக்கப்பட்ட பாதை ஒரு கோப்பாகும்! தயவுசெய்து ஒரு கோப்பகத்தைத் தேர்ந்தெடுக்கவும்!
  focusLayoutDescription: கவனம் செலுத்தும் தளவமைப்பு என்பது மைன்கிராஃப்ட் துவக்கியின் பாரம்பரிய தளவமைப்பாகும். இது ஒரு ஒற்றை நிகழ்வு அல்லது சில நிகழ்வுகளுடன் பயன்படுத்த வடிவமைக்கப்பட்டுள்ளது.
