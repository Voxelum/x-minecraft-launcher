  addCurseForgeDescription: curseforge தரவு கோப்புறையிலிருந்து இறக்குமதி செய்யவும். நீங்கள் curseforge இன் முதன்மை தரவு கோப்புறையைத் தேர்ந்தெடுக்க வேண்டும்
  addDescription: புதிதாக ஒரு புதிய நிகழ்வை உருவாக்கவும்
  addMMCDescription: ஏற்கனவே உள்ள MultiMC நிகழ்வை இறக்குமதி செய்யவும். MultiMC இலிருந்து தரவு கோப்புறையை நீங்கள் தேர்ந்தெடுக்க வேண்டும்.
  addManually: கைமுறையாக உருவாக்கு
  addModrinthDescription: ஏற்கனவே உள்ள Modrinth நிகழ்வை இறக்குமதி செய்யவும். Modrinth முதன்மை தரவு கோப்புறையை நீங்கள் தேர்ந்தெடுக்க வேண்டும்.
  addPrismDescription: ஏற்கனவே உள்ள PrismLauncher நிகழ்வை இறக்குமதி செய்யவும்.
  addServer: சர்வரிலிருந்து உருவாக்கு
  addServerDescription: இது நேரடியாக சர்வருக்குள் நுழையும் விளையாட்டை உருவாக்கும்.
  addTemplate: பதிவிறக்கம் செய்யப்பட்ட மாட்பேக்கிலிருந்து உருவாக்கு
  addTemplateDescription: பதிவிறக்கம் செய்யப்பட்ட மாட்பேக்கிலிருந்து இறக்குமதி செய்யவும்
  addVanilla: வெண்ணிலா போன்ற Minecraft இலிருந்து உருவாக்கு
  addVanillaDescription: பொதுவான .minecraft கோப்புறையிலிருந்து இறக்குமதி செய்யவும். இது அசல் விளையாட்டு சுயவிவரத்தை XMCL க்கு நகலெடுக்கும்.
  edition: பதிப்பு
