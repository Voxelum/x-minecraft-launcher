    description: தரவு ரூட் என்பது ஒரு பொதுவான .minecraft கோப்பகம் அல்ல. XMCL தரவுக் கோப்பக அமைப்பு அசல் அமைப்பிலிருந்து வேறுபடுவதால், பொதுவான .minecraft கோப்பகத்தை தரவு ரூட்டாகப் பயன்படுத்த நாங்கள் பரிந்துரைக்கவில்லை.
