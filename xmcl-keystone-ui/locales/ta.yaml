  copyLocalHint: |
    "உள்ளூர் SDP உரையை நகலெடுத்து அதை உங்கள் இணைக்கும் நபருக்கு அனுப்பவும், இதனால் அவர்கள் இந்த உரையை இணைப்பு பிரிவில் உள்ளிடலாம். <span>ஒரு டோக்கனை <span style=\"color: red; font-weight: bold;\">ஒரு நபருக்கு</span> மட்டுமே பயன்படுத்த முடியும்! ஒரே டோக்கனை பல நபர்களுக்கு அனுப்ப முடியாது!</span> <br> <span class=\"hint-text\" style=\"font-style: italic;\">நீங்கள் பல நபர்களை இணைக்க வேண்டும் என்றால், நீங்கள் <span style=\"font-weight: bold; color: rgba(245, 158, 11)\">பல</span> இணைப்புகளை உருவாக்க வேண்டும்.</span>"
