tutorial:
  feedbackDescription: ஏதேனும் சிக்கல்களைச் சந்தித்தால், கருத்து அனுப்ப இந்த பொத்தானைக் கிளிக் செய்யவும்!
  hideNewsHeaderDescription: இடதுபுறத்தில் நீங்கள் செய்தி காட்சியைக் காணலாம். இந்த பொத்தானைக் கிளிக் செய்வதன் மூலம் இந்தக் காட்சியை மறைக்க முடியும்.
  instance:
    iconDescription: ஐகானை மாற்ற கிளிக் செய்யவும்.
    iconTitle: நிகழ்வு ஐகான்
    javaDescription: ஜாவா பதிப்பைத் தேர்ந்தெடுக்கவும் அல்லது மாற்றவும்.
    javaImportDescription: உள்ளூர் சேமிப்பகத்திலிருந்து ஜாவாவை இறக்குமதி செய்யவும்.
    javaImportTitle: ஜாவாவை இறக்குமதி செய்
    javaTitle: ஜாவா பட்டியல்
  instanceAddDescription: ஏற்கனவே உள்ள மைன்கிராஃப்ட் நிகழ்வை இறக்குமதி செய்ய அல்லது புதிதாக அல்லது மோட்பேக்கிலிருந்து புதிய ஒன்றை உருவாக்க இந்தப் பொத்தானைக் கிளிக் செய்யவும்.
  instanceSelectDescription: இந்தப் பொத்தானைக் கிளிக் செய்வதன் மூலம் விளையாட்டைத் தேர்ந்தெடுக்கும் மற்றும் செய்திகளைப் படிக்கும் பக்கத்திற்குச் செல்லலாம்.
  launchDescription: விளையாட்டை நிறுவ அல்லது தொடங்க இந்தப் பொத்தானைக் கிளிக் செய்யவும்.
  mod:
    defaultSourceDescription: மோட்ஸ் விவரங்களின் மூலத்தை இங்கே நீங்கள் தேர்வு செய்யலாம். Modrinth மற்றும் Curseforge இரண்டிலும் வெளியிடப்பட்ட மோட்கள் உள்ளன. இந்த இரண்டு உள்ளடக்க வழங்குநர்களுக்கும் இடையே மாற விரும்பினால், இங்கே மதிப்பை மாற்றலாம்.
    defaultSourceTitle: மோட் உள்ளடக்க மூலத்தைத் தேர்ந்தெடுக்கவும்
    detailDescription: இடதுபுறத்தில் உள்ள ஒரு உருப்படியைத் தேர்ந்தெடுக்கும்போது மோட்டின் விவரங்களைக் காண்பீர்கள். உள்ளடக்கமானது Modrinth, Curseforge அல்லது பகுப்பாய்வு செய்யப்பட்ட மோட்டின் உள்ளடக்கத்திலிருந்து வரலாம்.
    detailTitle: மோட் விவரம்
    listDescription: நீங்கள் எந்த உள்ளீடும் வழங்காதபோது நிறுவப்பட்ட மோட்களைக் காண்பிப்போம். உங்கள் உள்ளீட்டில் ஒரு முக்கிய சொல் அல்லது வகை தேர்ந்தெடுக்கப்பட்டதும் தேடப்பட்ட மோட்களைக் காண்பீர்கள்.
    listTitle: நிறுவப்பட்ட அல்லது தேடப்பட்ட மோட்
    searchDescription: இந்தத் தேடல் பெட்டியைக் கொண்டு Modrinth, Curseforge அல்லது உங்கள் உள்ளூர் தற்காலிக சேமிப்பிலிருந்து மோட்களைத் தேடலாம்.
    searchTitle: மோட்களைத் தேடு
  multiplayer:
    contentDescription: உங்களுக்கும் உங்கள் சக நண்பர்களுக்கும் இடையிலான இணைப்புகள் இங்கே பட்டியலிடப்படும்.
    contentTitle: '@:multiplayer.connections'
    groupDescription: நீங்கள் மற்ற வீரர்களுடன் ஒரு குழுவை உருவாக்கலாம் அல்லது சேரலாம். குழுவின் அடிப்படையில் உங்களுக்கும் உங்கள் நண்பர்களுக்கும் இடையே P2P இணைப்புகளை உருவாக்க துவக்கி முயற்சிக்கும். உங்கள் நண்பர்கள் கொடுத்த குழுவின் பெயரை நீங்கள் உள்ளிடலாம். அல்லது ஒரு தனித்துவமான பெயரை உருவாக்கலாம்.
    groupTitle: குழுவில் சேர்
    joinDescription: குழுவின் பெயரை உள்ளிட்டதும், குழுவில் சேர அல்லது உருவாக்க இந்தப் பொத்தானைக் கிளிக் செய்யலாம். குழுவின் பெயர் காலியாக இருந்தால், துவக்கி உங்களுக்காக ஒரு பெயரை உருவாக்கும்.
    manualDescription: நீங்களோ அல்லது உங்கள் நண்பரோ குழுவுடன் இணைக்க முடியாவிட்டால், கைமுறையாக இணைப்பைக் கிளிக் செய்து டோக்கனை கைமுறையாகப் பரிமாறிக்கொள்ள முயற்சிக்கலாம். அதுவும் தோல்வியுற்றால், அது இணையப் பிரச்சனையாக இருக்கலாம்.
  recentPlayDescription: உருவாக்கப்பட்ட விளையாட்டுகள் இங்கே பட்டியலிடப்படும். நிறுவப்பட்ட பதிப்புகள் மற்றும் பதிவிறக்கம் செய்யப்பட்ட மோட்பேக்குகளையும் காண நீங்கள் காட்சிகளை இங்கே மாற்றலாம்.
  storePoupularModpackDescription: Curseforge மற்றும் Modrinth இல் மிகவும் பிரபலமான மோட்பேக்குகளை இந்தப் பிரிவில் காண்பீர்கள்.
  storeSearchCategoryDescription: நீங்கள் இங்கே வகைகளை அல்லது வடிப்பான்களை மாற்றலாம்.
  storeSearchDescription: இந்த உரை பெட்டியில் உள்ளிடுவதன் மூலம் மோட்பேக்குகளைத் தேடலாம். தேட Enter ஐ அழுத்தவும்.
  storeSearchResultDescription: அனைத்து தேடல் முடிவுகளையும் இங்கே பட்டியலிடப்பட்டு காண்பீர்கள்.
  userAccountDescription: உங்கள் மைன்கிராஃப்ட் கணக்கைச் சேர்க்க அல்லது நிர்வகிக்க இந்த ஐகானைக் கிளிக் செய்யவும்.
