  launchGeneralException:
    description: சில பிழைகள் காரணமாக துவக்கம் தோல்வியடைந்தது.
    title: துவக்கம் தோல்வியடைந்தது
  launchInvalidJavaPath:
    description: தேர்ந்தெடுக்கப்பட்ட ஜாவா இல்லை அல்லது தவறானது. தயவுசெய்து புதிய ஒன்றைத் தேர்ந்தெடுக்கவும். <span class="highlight"> {javaPath} </span>
    title: தவறான ஜாவா பாதை
  launchJavaNoPermission:
    description: துவக்கிக்கு ஜாவாவை இயக்க அனுமதி இல்லை <span class="highlight"> {javaPath} </span>. ஜாவா கோப்பின் அனுமதியை மாற்றவும் அல்லது துவக்கியின் அனுமதியை உயர்த்தவும்.
    title: துவக்க அனுமதி இல்லை
  launchNoProperJava:
    description: விளையாட்டைத் தொடங்க சரியான ஜாவாவைத் தேர்ந்தெடுக்க முடியாது. ({javaPath} தவறானதா?)
    title: சரியான ஜாவா எதுவும் காணப்படவில்லை
  launchNoVersionInstalled:
    description: துவக்குவதற்கு <span class="highlight">{version}</span> பதிப்பைத் தீர்க்க முடியவில்லை.
    title: பதிப்பு எதுவும் தேர்ந்தெடுக்கப்படவில்லை
  launchSpawnProcessFailed:
    description: தயவுசெய்து உங்கள் ஜாவாவைச் சரிபார்க்கவும், அல்லது துவக்கிக்கு கூடுதல் அனுமதிகளை வழங்கி மீண்டும் முயற்சிக்கவும். இது இன்னும் வேலை செய்யவில்லை எனில், டெவலப்பர்களைத் தொடர்பு கொள்ளவும்.
    title: விளையாட்டு செயல்முறையைத் தொடங்க முடியவில்லை
  unexpectedText: இது எதிர்பாராதது. சிக்கலைத் தணிக்க நீங்கள் துவக்கியை மீண்டும் தொடங்கலாம். இந்த சிக்கல் மீண்டும் ஏற்பட்டால் தயவுசெய்து ஆசிரியரைத் தொடர்பு கொள்ளவும்.
