  editionBedrock: பெட்ராக் பதிப்பு (Bedrock Edition)
  editionBedrockHint: பெட்ராக் பதிப்பு மைக்ரோசாஃப்ட் ஸ்டோர் ஆப் மூலம் தொடங்கப்படுகிறது. உங்களிடம் பெட்ராக் உரிமம் இருக்க வேண்டும். மாட்கள், ரிசோர்ஸ் பேக்குகள் மற்றும் பிற ஜாவா-மட்டும் கொண்ட அம்சங்கள் கிடைக்காது.
