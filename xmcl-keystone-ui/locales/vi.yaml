  loginXboxAdultVerification: Tài khoản Microsoft của bạn yêu cầu xác minh độ tuổi người lớn (thường yêu cầu ở một số khu vực) trước khi có thể đăng nhập vào Xbox. Hãy mở {url} trên trình duyệt để hoàn tất xác minh, sau đó thử lại.
  loginXboxAgeRestricted: Không thể đăng nhập Xbox do vấn đề độ tuổi. Vui lòng đảm bảo độ tuổi được đặt cho tài khoản Microsoft của bạn là trên 18 tuổi.
  loginXboxBadXsts: Microsoft đã trả về phản hồi XSTS không có các xác nhận người dùng mong đợi. Điều này thường là tạm thời -- vui lòng thử lại sau vài phút.
  loginXboxBanned: Tài khoản Microsoft / Xbox này đã bị đình chỉ hoặc cấm bởi Microsoft và không thể đăng nhập vào Minecraft. Vui lòng liên hệ với bộ phận hỗ trợ của Microsoft / Xbox.
  loginXboxChildAccount: Tài khoản Microsoft của bạn là tài khoản trẻ em và cần được thêm vào Gia đình Microsoft trước khi có thể đăng nhập vào Xbox / Minecraft. Hãy mở {url} trên trình duyệt để khắc phục, sau đó thử lại.
  loginXboxFailed: Đăng nhập Xbox bằng token Microsoft thất bại. Vui lòng đảm bảo tài khoản Microsoft của bạn có liên kết với tài khoản Xbox độc lập. Hãy thử lại.
  loginXboxFailedWithCode: Đăng nhập Xbox bằng token Microsoft thất bại (Mã lỗi XErr {code}). Vui lòng tìm kiếm mã lỗi này để được trợ giúp, hoặc thử lại sau.
  loginXboxNoXboxProfile: Tài khoản Microsoft này chưa có hồ sơ Xbox. Hãy mở {url} trên trình duyệt để tạo hồ sơ, sau đó thử lại.
  loginXboxRegionLocked: Xbox Live không khả dụng ở khu vực của tài khoản bạn. Vui lòng thay đổi quốc gia/khu vực của tài khoản Microsoft trong cài đặt và thử lại.
  noProfileForNewUser: Không tìm thấy hồ sơ trò chơi! Nếu bạn là người dùng Minecraft mới, vui lòng đăng nhập ít nhất một lần bằng trình khởi chạy chính thức của Minecraft.
