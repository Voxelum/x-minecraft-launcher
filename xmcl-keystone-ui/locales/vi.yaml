  feedbackDescription: Nếu bạn gặp bất kỳ sự cố nào, vui lòng nhấp vào nút này để gửi phản hồi!
  hideNewsHeaderDescription: Bạn có thể thấy phần tin tức hiển thị ở bên trái. Nhấp vào nút này có thể ẩn phần hiển thị này.
  instance:
    iconDescription: Nhấp để thay đổi biểu tượng.
    iconTitle: Biểu tượng phiên bản
    javaDescription: Chọn hoặc chuyển đổi phiên bản Java.
    javaImportDescription: Nhập Java từ bộ nhớ cục bộ.
    javaImportTitle: Nhập Java
    javaTitle: Danh sách Java
  instanceAddDescription: Nhấp vào nút này để nhập phiên bản Minecraft hiện có hoặc tạo một phiên bản mới từ đầu hoặc từ modpack.
  instanceSelectDescription: Nhấp vào nút này sẽ chuyển hướng đến trang để chọn trò chơi và đọc tin tức.
  launchDescription: Nhấp vào nút này để cài đặt hoặc khởi chạy trò chơi.
  mod:
    defaultSourceDescription: Bạn có thể chọn nguồn chi tiết của mod tại đây. Đó là các mod được xuất bản trên cả Modrinth và Curseforge. Nếu muốn chuyển đổi giữa hai nhà cung cấp nội dung này, bạn có thể thay đổi giá trị tại đây.
    defaultSourceTitle: Chọn nguồn nội dung mod
    detailDescription: Khi bạn chọn một mục bên trái, bạn sẽ thấy thông tin chi tiết về bản mod đó. Nội dung có thể đến từ Modrinth, Curseforge hoặc nội dung mod được phân tích cục bộ.
    detailTitle: Chi tiết Mod
    listDescription: Chúng tôi sẽ hiển thị các mod đã cài đặt khi bạn không nhập bất kỳ thông tin nào. Bạn sẽ thấy các mod được tìm kiếm khi từ khóa nhập vào của bạn hoặc danh mục được chọn.
    listTitle: Mod đã cài đặt hoặc Tìm kiếm
    searchDescription: Bạn có thể tìm kiếm mod từ Modrinth, Curseforge hoặc bộ đệm cục bộ của bạn bằng hộp tìm kiếm này.
    searchTitle: Tìm kiếm Mod
  multiplayer:
    contentDescription: Các kết nối giữa bạn và những người chơi khác sẽ được liệt kê tại đây.
    contentTitle: '@:multiplayer.connections'
    groupDescription: Bạn có thể tạo hoặc tham gia một nhóm với những người chơi khác. Trình khởi chạy sẽ cố gắng tạo kết nối P2P giữa bạn và bạn bè của bạn tùy thuộc vào nhóm. Bạn có thể nhập tên nhóm do bạn bè cung cấp hoặc tạo một tên duy nhất.
    groupTitle: Tham gia một nhóm
    joinDescription: Khi bạn đã nhập tên nhóm, bạn có thể nhấp vào nút này để tham gia hoặc tạo nhóm. Nếu tên nhóm để trống, trình khởi chạy sẽ tự động tạo một tên cho bạn.
    manualDescription: Nếu bạn hoặc bạn bè của bạn không thể kết nối vào nhóm, bạn có thể thử trao đổi mã token thủ công bằng cách nhấp vào kết nối thủ công. Nếu việc này cũng thất bại, đó có thể là do sự cố kết nối Internet.
  recentPlayDescription: Các trò chơi đã tạo sẽ được liệt kê tại đây. Bạn có thể chuyển đổi các chế độ xem tại đây để xem cả các phiên bản đã cài đặt và các modpack đã tải xuống.
  storePoupularModpackDescription: Bạn sẽ thấy các modpack phổ biến nhất trên Curseforge và Modrinth trong phần này.
  storeSearchCategoryDescription: Bạn cũng có thể bật tắt các danh mục hoặc bộ lọc tại đây.
  storeSearchDescription: Bạn có thể tìm kiếm các Modpack bằng cách nhập vào hộp văn bản này. Nhấn Enter để tìm kiếm.
  storeSearchResultDescription: Bạn sẽ thấy tất cả kết quả tìm kiếm được liệt kê tại đây.
  userAccountDescription: Nhấp vào biểu tượng này để thêm hoặc quản lý tài khoản Minecraft của bạn.
