    Erre a gombra kattintva importálhatsz létező Minecraftot vagy hozhatsz létre egy újat a vagy modcsomagot.
  instanceSelectDescription: >-
    Erre a gombra kattintva a játék kiválasztásához és a hírek olvasásához szükséges oldalra navigál.
  launchDescription: Kattints erre a gombra a játék telepítéséhez vagy elindításához.
  mod:
    defaultSourceDescription: >-
      Itt kiválaszthatja a modok forrását. Vannak a Modrinth és a Curseforge által közzétett modok. Ha váltani akarsz e két tartalomszolgáltató között. Itt módosíthatod az értéket.
    defaultSourceTitle: Mod tartalom forrásának kiválasztása
    detailDescription: >-
      Amikor kiválaszt egy elemet a bal oldalon. Látni fogja a mod részleteit. A tartalom származhat Modrinth, Curseforge vagy elemzett mod tartalmából.
    detailTitle: Mod részletek
    listDescription: >-
      Megjelenítjük a telepített modokat, ha nincs inputja. A keresett modokat akkor fogja látni, ha a kulcsszó vagy a kategória kiválasztása megtörtént.
    listTitle: Installed or Searched Mod
    searchDescription: >-
      A Modrinth, Curseforge vagy a helyi gyorsítótár modjait keresheted ezzel a keresőmezővel.
    searchTitle: Modok keresése
  multiplayer:
    contentDescription: Az Ön és társai közötti kapcsolatok itt lesznek felsorolva.
    contentTitle: '@:multiplayer.connections'
    groupDescription: >-
      Létrehozhatsz egy csoportot, vagy csatlakozhatsz egy csoporthoz más játékosokkal. A launcher megpróbál P2P-kapcsolatokat létrehozni közted és barátaid között a csoportnak megfelelően. A barátaid által megadott csoportnevet megadhatod. Vagy létrehozhatsz egy egyedi nevet a sajátodból.
    groupTitle: Csatlakozás egy csoporthoz
    joinDescription: >-
      Miután beírt egy csoportnevet. Erre a gombra kattintva csatlakozhat a csoporthoz vagy létrehozhatja azt. Ha a csoportnév üres, az indítóprogram generál egy nevet az Ön számára.
    manualDescription: >-
      Ha Ön vagy barátja nem tud csatlakozni a csoporthoz. Megpróbálhatja manuálisan kicserélni a tokent a manuális csatlakozás gombra kattintva. Ha ez is sikertelen, akkor az internetprobléma lehet.
  recentPlayDescription: >-
    A létrehozott játékok itt lesznek felsorolva.

    Itt váltogathatja a nézeteket, hogy megtekinthesse a telepített verziókat és a letöltött modpackokat is.
