tutorial:
  feedbackDescription: यदि आपको कोई समस्या आती है, तो कृपया प्रतिक्रिया भेजने के लिए इस बटन पर क्लिक करें!
  hideNewsHeaderDescription: आप बाईं ओर समाचार शोकेस देख सकते हैं। इस बटन पर क्लिक करने से यह शोकेस छिप सकता है।
