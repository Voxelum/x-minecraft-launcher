    javaDescription: Java संस्करण चुनें या बदलें।
    javaImportDescription: स्थानीय स्टोरेज से Java आयात करें।
    javaImportTitle: Java आयात करें
    javaTitle: Java सूची
  instanceAddDescription: मौजूदा माइनक्राफ्ट इंस्टेंस को आयात करने या शुरुआत से या मॉडपैक से एक नया बनाने के लिए इस बटन पर क्लिक करें।
  instanceSelectDescription: इस बटन पर क्लिक करने से गेम चुनने और समाचार पढ़ने के लिए पेज पर नेविगेट किया जाएगा।
  launchDescription: गेम इंस्टॉल करने या लॉन्च करने के लिए इस बटन पर क्लिक करें।
  mod:
    defaultSourceDescription: आप यहाँ मॉड विवरण का स्रोत चुन सकते हैं। ऐसे मॉड हैं जो मोडरिंथ और कर्सफोर्ज दोनों पर प्रकाशित हैं। यदि आप इन दोनों सामग्री प्रदाताओं के बीच स्विच करना चाहते हैं, तो आप यहाँ मान बदल सकते हैं।
    defaultSourceTitle: मॉड सामग्री स्रोत चुनें
    detailDescription: जब आप बाईं ओर कोई आइटम चुनते हैं। आपको मॉड का विवरण दिखाई देगा। सामग्री मोडरिंथ, कर्सफोर्ज या पार्स किए गए मॉड की सामग्री से आ सकती है।
    detailTitle: मॉड विवरण
    listDescription: जब आपका कोई इनपुट नहीं होगा तो हम स्थापित मॉड प्रदर्शित करेंगे। जैसे ही आपके इनपुट में कोई कीवर्ड या श्रेणी चुनी जाएगी, आपको खोजे गए मॉड दिखाई देंगे।
    listTitle: मॉड इंस्टॉल करें या खोजें
    searchDescription: आप इस खोज बॉक्स से मोडरिंथ, कर्सफोर्ज या अपने स्थानीय कैश से मॉड खोज सकते हैं।
    searchTitle: मॉड खोजें
  multiplayer:
    contentDescription: आप और आपके पीयर के बीच कनेक्शन यहाँ सूचीबद्ध होंगे।
    contentTitle: '@:multiplayer.connections'
    groupDescription: आप अन्य खिलाड़ियों के साथ एक समूह बना सकते हैं या उसमें शामिल हो सकते हैं। लॉन्चर समूह के अनुसार आपके और आपके दोस्तों के बीच P2P कनेक्शन बनाने का प्रयास करेगा। आप अपने दोस्तों द्वारा दिए गए समूह का नाम दर्ज कर सकते हैं। या आप एक अनूठा नाम बना सकते हैं।
    groupTitle: एक ग्रुप जॉइन करें
    joinDescription: एक बार आप समूह का नाम दर्ज कर लेते हैं, तो आप समूह में शामिल होने या बनाने के लिए इस बटन पर क्लिक कर सकते हैं। यदि समूह का नाम खाली है, तो लॉन्चर आपके लिए एक नाम तैयार करेगा।
    manualDescription: यदि आप या आपका मित्र समूह से कनेक्ट नहीं हो सकते हैं, तो आप मैन्युअल रूप से कनेक्ट पर क्लिक करके मैन्युअल रूप से टोकन का आदान-प्रदान करने का प्रयास कर सकते हैं। यदि वह भी विफल रहा, तो यह एक इंटरनेट समस्या हो सकती है।
  recentPlayDescription: बनाए गए गेम यहाँ सूचीबद्ध होंगे। आप यहाँ विचारों को स्विच करके स्थापित संस्करणों और डाउनलोड किए गए मॉडपैक को भी देख सकते हैं।
  storePoupularModpackDescription: आप इस अनुभाग में कर्सफोर्ज और मोडरिंथ के सबसे लोकप्रिय मॉडपैक देखेंगे।
  storeSearchCategoryDescription: आप यहाँ श्रेणियों या फ़िल्टर को भी टॉगल कर सकते हैं।
  storeSearchDescription: आप इस टेक्स्ट बॉक्स में इनपुट करके मॉडपैक खोज सकते हैं। खोजने के लिए Enter दबाएं।
  storeSearchResultDescription: आपको यहाँ सूचीबद्ध सभी खोज परिणाम दिखाई देंगे।
  userAccountDescription: अपना माइनक्राफ्ट खाता जोड़ने या प्रबंधित करने के लिए इस आइकन पर क्लिक करें।
