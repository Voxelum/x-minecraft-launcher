    searchTitle: মড অনুসন্ধান করুন
  multiplayer:
    contentDescription: আপনার এবং আপনার সহকর্মীদের (পিয়ার) মধ্যকার সংযোগগুলো এখানে তালিকাভুক্ত করা হবে।
    contentTitle: '@:multiplayer.connections'
    groupDescription: আপনি অন্য খেলোয়াড়দের সাথে একটি গ্রুপ তৈরি করতে বা যোগ দিতে পারেন। গ্রুপ অনুযায়ী লঞ্চার আপনার এবং আপনার বন্ধুদের মধ্যে P2P সংযোগ তৈরি করার চেষ্টা করবে। আপনি আপনার বন্ধুদের দেওয়া গ্রুপের নাম লিখতে পারেন। অথবা আপনি একটি অনন্য নাম তৈরি করতে পারেন।
    groupTitle: একটি গ্রুপে যোগ দিন
    joinDescription: গ্রুপের নাম দেওয়ার পর, আপনি গ্রুপে যোগ দিতে বা তৈরি করতে এই বোতামটিতে ক্লিক করতে পারেন। যদি গ্রুপের নাম খালি থাকে, তবে লঞ্চার আপনার জন্য একটি নাম তৈরি করবে।
    manualDescription: যদি আপনি বা আপনার বন্ধু গ্রুপে সংযোগ করতে না পারেন, তবে ম্যানুয়ালি কানেক্ট-এ ক্লিক করে ম্যানুয়ালি টোকেন বিনিময় করার চেষ্টা করতে পারেন। যদি সেটিও ব্যর্থ হয়, তবে এটি একটি ইন্টারনেট সমস্যা হতে পারে।
  recentPlayDescription: তৈরি করা গেমগুলি এখানে তালিকাভুক্ত করা হবে। ইনস্টল করা সংস্করণ এবং ডাউনলোড করা মডপ্যাকগুলি দেখতে আপনি এখানে ভিউ পরিবর্তন করতে পারেন।
