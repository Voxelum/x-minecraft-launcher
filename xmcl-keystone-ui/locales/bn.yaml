    detailDescription: যখন আপনি বাম দিকে কোনো আইটেম নির্বাচন করবেন, তখন আপনি মডের বিবরণ দেখতে পাবেন। কন্টেন্টটি Modrinth, Curseforge অথবা পার্স করা মডের বিষয়বস্তু থেকে আসতে পারে।
    detailTitle: মডের বিবরণ
    listDescription: আপনার কোনো ইনপুট না থাকলে আমরা ইনস্টল করা মডগুলো প্রদর্শন করব। আপনার ইনপুটে কোনো কিওয়ার্ড বা বিভাগ নির্বাচিত হলে আপনি অনুসন্ধান করা মডগুলো দেখতে পাবেন।
