  mod:
    defaultSourceDescription: আপনি এখানে মডের বিস্তারিত তথ্যের উৎস চয়ন করতে পারেন। এখানে Modrinth এবং Curseforge উভয় জায়গায় প্রকাশিত মডগুলো রয়েছে। আপনি যদি এই দুটি কন্টেন্ট প্রোভাইডারের মধ্যে পরিবর্তন করতে চান, তবে আপনি এখানকার মানটি পরিবর্তন করতে পারেন।
