  gatheringIce: |
    অনুগ্রহ করে অপেক্ষা করুন যাতে ICE সার্ভার আপনার নেটওয়ার্ক সম্পর্কে পর্যাপ্ত তথ্য সংগ্রহ করতে পারে। আপনি যদি অধৈর্য হন এবং পর্যাপ্ত তথ্য থাকে, তবে আপনি আগেই অন্য পক্ষকে বর্তমান SDP প্রদান করতে পারেন এবং পরবর্তীতে ক্লিক করতে পারেন। অনুগ্রহ করে আপনার পিয়ারকে <span class="v-chip v-chip--label v-size--small" style="text-font: bold" >Local Token</span> পাঠান, আপনার পিয়ার আপনার টোকেনটি <span class="v-chip v-chip--label v-size--small" style="text-font: bold"> Join Connection </span> বিভাগে প্রবেশ করাবেন। <br> আপনার তথ্য সংগ্রহ করে <span class="v-chip v-chip--label v-size--small" style="text-font: bold">Local token</span> তৈরি করতে ICE সার্ভারের কিছু সময় লাগতে পারে।<br> আপনাকে ICE এর স্থিতি সম্পূর্ণ হওয়া পর্যন্ত অপেক্ষা করতে হবে না। নিচের টোকেনটি অপরিবর্তিত থাকলে, আপনি এটি কপি করে আপনার পিয়ারকে পাঠাতে পারেন।
