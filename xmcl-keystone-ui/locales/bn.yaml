  loginMinecraftByXboxRateLimitedWithRetry: মাইক্রোসফটের মাইনক্রাফ্ট প্রমাণীকরণ পরিষেবা বর্তমানে অনুরোধ সীমিত করছে (HTTP 429)। অনুগ্রহ করে প্রায় {seconds} সেকেন্ড অপেক্ষা করুন এবং আবার চেষ্টা করুন।
  loginMinecraftByXboxServerError: মাইক্রোসফটের মাইনক্রাফ্ট প্রমাণীকরণ পরিষেবা একটি সার্ভার ত্রুটি (HTTP {status}) রিটার্ন করেছে। এটি তাদের প্রান্তের সমস্যা। অনুগ্রহ করে কয়েক মিনিট পর আবার চেষ্টা করুন।
  loginMinecraftByXboxStatus: এক্সবক্স টোকেন দ্বারা মাইনক্রাফ্ট টোকেন বিনিময় করতে ব্যর্থ (HTTP {status})। অনুগ্রহ করে নিশ্চিত করুন যে আপনার এক্সবক্সে মাইনক্রাফ্ট রয়েছে, অথবা পুনরায় চেষ্টা করুন।
  loginXboxAdultVerification: এক্সবক্সে সাইন ইন করার আগে আপনার মাইক্রোসф্ট অ্যাকাউন্টের প্রাপ্তবয়স্ক যাচাইকরণ (সাধারণত কিছু অঞ্চলে প্রয়োজনীয়) প্রয়োজন। যাচাইকরণ সম্পন্ন করতে আপনার ব্রাউজারে {url} খুলুন, তারপর আবার চেষ্টা করুন।
  loginXboxAgeRestricted: বয়সজনিত সমস্যার কারণে এক্সবক্সে লগইন করতে ব্যর্থ। অনুগ্রহ করে নিশ্চিত করুন যে আপনার মাইক্রোসф্ট অ্যাকাউন্টের বয়স নির্ধারণ করা আছে এবং বয়স ১৮ বছরের উপরে।
  loginXboxBadXsts: মাইক্রোসф্ট প্রত্যাশিত ব্যবহারকারী ক্লেম ছাড়াই একটি XSTS প্রতিক্রিয়া রিটার্ন করেছে। এটি সাধারণত সাময়িক -- অনুগ্রহ করে কয়েক মিনিট পর আবার চেষ্টা করুন।
  loginXboxBanned: এই মাইক্রোসф্ট / এক্সবক্স অ্যাকাউন্টটি মাইক্রোসф্ট দ্বারা সাময়িকভাবে স্থগিত বা নিষিদ্ধ করা হয়েছে এবং এটি মাইনক্রাফ্টে সাইন ইন করতে পারছে না। অনুগ্রহ করে মাইক্রোসф্ট / এক্সবক্স সহায়তার সাথে যোগাযোগ করুন।
  loginXboxChildAccount: আপনার মাইক্রোসф্ট অ্যাকাউন্টটি একটি শিশু অ্যাকাউন্ট এবং এক্সবক্স / মাইনক্রাফ্টে সাইন ইন করার আগে এটিকে একটি মাইক্রোসф্ট ফ্যামিলিতে যুক্ত করতে হবে। এটি ঠিক করতে আপনার ব্রাউজারে {url} খুলুন, তারপর আবার চেষ্টা করুন।
  loginXboxFailed: মাইক্রোসফট টোকেন দ্বারা এক্সবক্সে লগইন করতে ব্যর্থ। অনুগ্রহ করে নিশ্চিত করুন যে আপনার মাইক্রোসফট অ্যাকাউন্টের সাথে একটি স্বতন্ত্র এক্সবক্স অ্যাকাউন্ট রয়েছে। অনুগ্রহ করে আবার চেষ্টা করুন।
  loginXboxFailedWithCode: মাইক্রোসফট টোকেন দ্বারা এক্সবক্সে লগইন করতে ব্যর্থ (XErr {code})। সাহায্যের জন্য কোডটি সার্চ করুন, অথবা পরে আবার চেষ্টা করুন।
