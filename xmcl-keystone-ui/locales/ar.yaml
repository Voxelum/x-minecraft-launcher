    defaultSourceDescription: >-
      يمكنك اختيار مصدر تفاصيل التعديلات هنا. هناك تعديلات تم نشرها لكل من Modrinth وCurseforge. إذا كنت تريد التبديل بين موفري المحتوى هذين، فيمكنك تغيير القيمة هنا.
