    detailDescription: >-
      عند تحديد عنصر على اليسار. سترى تفاصيل الوضع. يمكن أن يأتي المحتوى من محتوى Modrinth أو Curseforge أو التعديل الذي تم تحليله.
    detailTitle: 'تفاصيل التعديل'
    listDescription: >-
      سنعرض التعديلات المثبتة عندما لا يكون لديك أي مدخلات. سترى التعديلات التي تم البحث عنها بمجرد تحديد كلمة رئيسية أو فئة لمدخلاتك.
    listTitle: 'تم التثبيت أو البحث في Mod'
    searchDescription: >-
      يمكنك البحث عن التعديلات من Modrinth أو Curseforge أو ذاكرة التخزين المؤقت المحلية باستخدام مربع البحث هذا.
    searchTitle: 'تعديل البحث'
  multiplayer:
    contentDescription: 'سيتم إدراج الاتصالات بينك وبين زملائك هنا.'
    contentTitle: '@:multiplayer.connections'
    groupDescription: >-
      يمكنك إنشاء مجموعة أو الانضمام إليها مع لاعبين آخرين. سيحاول المشغل إنشاء اتصالات P2P بينك وبين أصدقائك وفقًا للمجموعة. يمكنك إدخال اسم المجموعة التي قدمها أصدقائك. أو يمكنك إنشاء اسم فريد.
    groupTitle: 'انضم إلى مجموعة'
    joinDescription: >-
      بمجرد إدخال اسم المجموعة، يمكنك النقر فوق هذا الزر للانضمام إلى المجموعة أو إنشائها. إذا كان اسم المجموعة فارغًا، فسيقوم المشغل بإنشاء اسم لك.
    manualDescription: >-
      إذا لم تتمكن أنت أو صديقك من الاتصال بالمجموعة، فيمكنك محاولة تبادل الرمز المميز يدويًا عن طريق النقر فوق الاتصال يدويًا. إذا فشل ذلك أيضًا، فقد تكون المشكلة تتعلق بالإنترنت.
  recentPlayDescription: >-
    سيتم إدراج الألعاب التي تم إنشاؤها هنا. يمكنك تبديل طرق العرض هنا لرؤية الإصدارات المثبتة وحزم التعديل التي تم تنزيلها أيضًا.
