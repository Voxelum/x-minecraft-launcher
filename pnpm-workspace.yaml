packages:
  - 'packages/**'
  - 'xmcl-electron-app'
  - 'xmcl-runtime-api'
  - 'xmcl-runtime'
  - 'xmcl-keystone-ui'
  - 'xmcl-client-vue'
  # NOTE: 'e2e' is intentionally NOT in this list. It's an opt-in sub-project
  # so the default `pnpm install` doesn't pull Playwright (~14 MB) for the
  # 95% of contributors who never run end-to-end tests. Install it on demand
  # with `pnpm --prefix=e2e install`. See e2e/README.md.
  - '.github/actions/*'
allowBuilds:
  '@parcel/watcher': true
  cpu-features: true
  electron: true
  esbuild: true
  node-datachannel: true
  ssh2: true
  vue-demi: true
enableGlobalVirtualStore: true

overrides:
  postcss: '>=8.5.10'
  rolldown: '1.0.1'
  ip: '^2.0.1'
  form-data: '^4.0.4'
  glob: '^10.5.0'
  semver: '^7.5.4'
  rollup: '^4.59.0'
  lodash: '^4.18.1'
  tar-fs: '^2.1.3'
  '@xmldom/xmldom': '^0.8.13'
  minimatch: '>=3.1.3 <4.0.0 || >=5.1.7 <6.0.0 || >=9.0.6 <10.0.0 || >=10.2.1'
  tar: '^7.5.3'
  braces: '^3.0.3'
  cross-spawn: '>=6.0.6 <7.0.0 || >=7.0.5'
  undici: '^7.28.0'
  tmp: '^0.2.7'
  electron-updater: '^6.8.9'
  picomatch: '>=2.3.2 <3.0.0 || >=3.0.2 <4.0.0 || >=4.0.4'
  defu: '^6.1.5'
  jws: '>=3.2.3 <4.0.0 || >=4.0.1'
  ejs: '^3.1.10'
  '@nevware21/ts-utils': '^0.14.0'
  brace-expansion: '>=1.1.13 <2.0.0 || >=2.0.3 <3.0.0 || >=3.0.2 <4.0.0 || >=5.0.6'
  micromatch: '^4.0.8'
  uuid: '^14.0.1'
  ajv: '>=6.14.0 <7.0.0 || >=8.18.0'
  js-yaml: '^4.2.0'
  markdown-it: '^14.2.0'
  '@opentelemetry/core': '^2.8.0'
  smol-toml: '^1.7.0'
  esbuild: '^0.28.1'
  '@tootallnate/once': '>=2.0.1 <3.0.0 || >=3.0.1'

# `cls-hooked` does `require('stack-chain')` but does not declare it in its
# package.json — upstream relies on `async-hook-jl` hoisting it. pnpm's
# isolated layout doesn't hoist transitive deps, so esbuild bundling
# `applicationinsights → cls-hooked` fails with "Could not resolve
# 'stack-chain'". Declare the missing dep here so it sits next to
# cls-hooked in node_modules.
packageExtensions:
  cls-hooked:
    dependencies:
      stack-chain: '^1.3.7'
